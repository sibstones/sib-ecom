services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-0}
        NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=3072}
        VITE_API_URL: ${VITE_API_URL:-/api}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-20971520}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT:-443}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      MINIO_REGION: ${MINIO_REGION:-ru-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_PRIVATE_BUCKET_NAME: ${MINIO_PRIVATE_BUCKET_NAME}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      SUPER_ADMIN_FIRST_NAME: ${SUPER_ADMIN_FIRST_NAME:-}
      SUPER_ADMIN_LAST_NAME: ${SUPER_ADMIN_LAST_NAME:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-}
      RESET_ADMIN_PASSWORDS: ${RESET_ADMIN_PASSWORDS:-false}
      API_RATE_LIMIT_DISABLED: ${API_RATE_LIMIT_DISABLED:-false}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-500}
      API_RATE_LIMIT_WINDOW_MINUTES: ${API_RATE_LIMIT_WINDOW_MINUTES:-15}
      AUTH_RATE_LIMIT_DISABLED: ${AUTH_RATE_LIMIT_DISABLED:-false}
      AUTH_RATE_LIMIT_LOGIN_MAX: ${AUTH_RATE_LIMIT_LOGIN_MAX:-10}
      AUTH_RATE_LIMIT_LOGIN_WINDOW_MINUTES: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_MINUTES:-15}
      AUTH_RATE_LIMIT_REGISTER_MAX: ${AUTH_RATE_LIMIT_REGISTER_MAX:-5}
      AUTH_RATE_LIMIT_REGISTER_WINDOW_MINUTES: ${AUTH_RATE_LIMIT_REGISTER_WINDOW_MINUTES:-60}
      AUTH_RATE_LIMIT_FORGOT_PASSWORD_MAX: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_MAX:-3}
      AUTH_RATE_LIMIT_FORGOT_PASSWORD_WINDOW_MINUTES: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_WINDOW_MINUTES:-60}
      AUTH_RATE_LIMIT_VERIFY_EMAIL_MAX: ${AUTH_RATE_LIMIT_VERIFY_EMAIL_MAX:-20}
      AUTH_RATE_LIMIT_VERIFY_EMAIL_WINDOW_MINUTES: ${AUTH_RATE_LIMIT_VERIFY_EMAIL_WINDOW_MINUTES:-60}
      CHECKOUT_RATE_LIMIT_MAX: ${CHECKOUT_RATE_LIMIT_MAX:-20}
      CHECKOUT_RATE_LIMIT_WINDOW_MINUTES: ${CHECKOUT_RATE_LIMIT_WINDOW_MINUTES:-15}
      SEARCH_RATE_LIMIT_MAX: ${SEARCH_RATE_LIMIT_MAX:-120}
      SEARCH_RATE_LIMIT_WINDOW_MINUTES: ${SEARCH_RATE_LIMIT_WINDOW_MINUTES:-15}
      UPLOAD_RATE_LIMIT_MAX: ${UPLOAD_RATE_LIMIT_MAX:-30}
      UPLOAD_RATE_LIMIT_WINDOW_MINUTES: ${UPLOAD_RATE_LIMIT_WINDOW_MINUTES:-15}
      BOT_PROTECTION_FAIL_CLOSED_IN_PRODUCTION: ${BOT_PROTECTION_FAIL_CLOSED_IN_PRODUCTION:-true}
      CAPTCHA_ENABLED_IN_PRODUCTION: ${CAPTCHA_ENABLED_IN_PRODUCTION:-true}
      CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-CLOUDFLARE_TURNSTILE}
      CAPTCHA_SITE_KEY: ${CAPTCHA_SITE_KEY:-}
      CAPTCHA_SECRET_KEY: ${CAPTCHA_SECRET_KEY:-}
      CAPTCHA_THRESHOLD: ${CAPTCHA_THRESHOLD:-0.5}
      CAPTCHA_REQUIRE_FOR_REGISTRATION_IN_PRODUCTION: ${CAPTCHA_REQUIRE_FOR_REGISTRATION_IN_PRODUCTION:-true}
      CAPTCHA_REQUIRE_FOR_LOGIN_IN_PRODUCTION: ${CAPTCHA_REQUIRE_FOR_LOGIN_IN_PRODUCTION:-true}
      REQUIRE_ADMIN_TWO_FACTOR_IN_PRODUCTION: ${REQUIRE_ADMIN_TWO_FACTOR_IN_PRODUCTION:-true}
      MAX_ACTIVE_SESSIONS_PER_USER: ${MAX_ACTIVE_SESSIONS_PER_USER:-5}
      DOCKER: true
    ports:
      - "${PORT:-3001}:3000"
    command: ["node", "scripts/start-server.js"]
