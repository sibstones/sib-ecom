services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fashion_dev_db}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fashion_dev_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-rag:
    image: ${POSTGRES_RAG_IMAGE:-pgvector/pgvector:pg16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_RAG_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_RAG_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_RAG_DB:-fashion_rag_dev_db}
    ports:
      - "${POSTGRES_RAG_PORT:-15433}:5432"
    volumes:
      - postgres_rag_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_RAG_USER:-postgres} -d ${POSTGRES_RAG_DB:-fashion_rag_dev_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_dev_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        CACHE_BUST: ${CACHE_BUST:-0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-rag:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/fashion_dev_db?schema=public}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      RAG_DATABASE_URL: ${RAG_DATABASE_URL:-postgresql://postgres:postgres@postgres-rag:5432/fashion_rag_dev_db?schema=public}
      RAG_DATABASE_DIRECT_URL: ${RAG_DATABASE_DIRECT_URL:-postgresql://postgres:postgres@postgres-rag:5432/fashion_rag_dev_db?schema=public}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-openai}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-large}
      RAG_RETRIEVAL_TOP_K: ${RAG_RETRIEVAL_TOP_K:-8}
      RAG_RETRIEVAL_MIN_SCORE: ${RAG_RETRIEVAL_MIN_SCORE:-0.2}
      RAG_HYBRID_SEARCH_ENABLED: ${RAG_HYBRID_SEARCH_ENABLED:-true}
      RAG_RERANK_ENABLED: ${RAG_RERANK_ENABLED:-false}
      RAG_CITATIONS_ENABLED: ${RAG_CITATIONS_ENABLED:-true}
      RAG_ADMIN_ENABLED: ${RAG_ADMIN_ENABLED:-false}
      RAG_CUSTOMER_ENABLED: ${RAG_CUSTOMER_ENABLED:-false}
      RAG_GUEST_ENABLED: ${RAG_GUEST_ENABLED:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-me-32chars}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-jwt-refresh-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-20971520}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-fashion-dev-uploads}
      MINIO_PRIVATE_BUCKET_NAME: ${MINIO_PRIVATE_BUCKET_NAME:-fashion-dev-private}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:19000/fashion-dev-uploads}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@fashion.local}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-SuperAdmin123!}
      SUPER_ADMIN_FIRST_NAME: ${SUPER_ADMIN_FIRST_NAME:-Super}
      SUPER_ADMIN_LAST_NAME: ${SUPER_ADMIN_LAST_NAME:-Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fashion.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-User}
      RESET_ADMIN_PASSWORDS: ${RESET_ADMIN_PASSWORDS:-false}
      API_RATE_LIMIT_DISABLED: ${API_RATE_LIMIT_DISABLED:-true}
      AUTH_RATE_LIMIT_DISABLED: ${AUTH_RATE_LIMIT_DISABLED:-true}
      DOCKER: true
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: ["node", "scripts/start-server-dev.js"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-0}
        NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=3072}
        VITE_API_URL: ${VITE_API_URL:-/api}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  backend_node_modules:
  postgres_dev_data:
  postgres_rag_dev_data:
  minio_dev_data:
